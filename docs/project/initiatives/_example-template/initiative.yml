# Initiative Metadata and Task Registry
# This is the source of truth for initiative structure

initiative:
  id: YYYY-MM-DD-initiative-name
  name: Example User Authentication System
  description: Complete user authentication with login, SSO, MFA, and session management
  status: planning  # planning|in-progress|completed|blocked
  priority: high    # low|medium|high|critical
  created: 2025-11-14
  owner: Team Name or Person
  estimated_hours: 240
  target_completion: 2025-11-30

  # Task definitions with dependencies
  tasks:
    - id: 2025-11-14-database-schema
      type: migration
      path: .ai-sdlc/tasks/migrations/2025-11-14-database-schema
      name: Database Schema for Users and Sessions
      description: Create database tables for users, sessions, and auth tokens
      status: pending
      dependencies: []  # No dependencies, can start immediately
      blocks: [2025-11-14-basic-login, 2025-11-14-sso-integration]
      estimated_hours: 30
      milestone: Foundation
      priority: critical

    - id: 2025-11-14-basic-login
      type: new-feature
      path: .ai-sdlc/tasks/new-features/2025-11-14-basic-login
      name: Basic Login/Logout API
      description: Implement core authentication endpoints with JWT tokens
      status: pending
      dependencies: [.ai-sdlc/tasks/migrations/2025-11-14-database-schema]
      blocks: [2025-11-15-frontend-ui, 2025-11-16-mfa]
      estimated_hours: 40
      milestone: Foundation
      priority: critical

    - id: 2025-11-14-sso-integration
      type: new-feature
      path: .ai-sdlc/tasks/new-features/2025-11-14-sso-integration
      name: SSO Integration with OAuth Providers
      description: Add OAuth 2.0 support for Google, GitHub, Microsoft
      status: pending
      dependencies: [.ai-sdlc/tasks/migrations/2025-11-14-database-schema]
      blocks: [2025-11-16-mfa]
      estimated_hours: 60
      milestone: Core Features
      priority: high

    - id: 2025-11-15-session-management
      type: new-feature
      path: .ai-sdlc/tasks/new-features/2025-11-15-session-management
      name: Session Management and Refresh Tokens
      description: Implement session tracking, refresh tokens, and logout
      status: pending
      dependencies: [.ai-sdlc/tasks/migrations/2025-11-14-database-schema]
      blocks: []
      estimated_hours: 35
      milestone: Foundation
      priority: high

    - id: 2025-11-15-frontend-ui
      type: new-feature
      path: .ai-sdlc/tasks/new-features/2025-11-15-frontend-ui
      name: Frontend Login UI Components
      description: Create login forms, registration, password reset UI
      status: pending
      dependencies: [.ai-sdlc/tasks/new-features/2025-11-14-basic-login]
      blocks: []
      estimated_hours: 50
      milestone: Core Features
      priority: medium

    - id: 2025-11-16-mfa
      type: enhancement
      path: .ai-sdlc/tasks/enhancements/2025-11-16-mfa
      name: Multi-Factor Authentication
      description: Add TOTP-based 2FA with QR code setup
      status: pending
      dependencies:
        - .ai-sdlc/tasks/new-features/2025-11-14-basic-login
        - .ai-sdlc/tasks/new-features/2025-11-14-sso-integration
      blocks: []
      estimated_hours: 45
      milestone: Production Ready
      priority: medium

  # Milestone groupings
  milestones:
    - name: Foundation
      description: Database and core authentication
      tasks:
        - 2025-11-14-database-schema
        - 2025-11-14-basic-login
        - 2025-11-15-session-management
      estimated_hours: 105
      status: pending

    - name: Core Features
      description: SSO and user-facing UI
      tasks:
        - 2025-11-14-sso-integration
        - 2025-11-15-frontend-ui
      estimated_hours: 110
      status: pending

    - name: Production Ready
      description: Security enhancements
      tasks:
        - 2025-11-16-mfa
      estimated_hours: 45
      status: pending

  # Execution configuration
  execution:
    strategy: mixed  # sequential|parallel|mixed
    rationale: |
      Database must come first, then basic login and SSO can run in parallel.
      Frontend and MFA depend on earlier work.
    max_parallel_tasks: 3

  # Critical path (longest dependency chain)
  critical_path:
    tasks:
      - 2025-11-14-database-schema
      - 2025-11-14-basic-login
      - 2025-11-16-mfa
    estimated_duration_hours: 115

  # Risk assessment
  risks:
    - category: technical
      description: OAuth provider integration complexity
      affected_tasks: [2025-11-14-sso-integration]
      severity: medium
      mitigation: Use well-tested libraries (Passport.js), test with sandbox accounts

    - category: dependency
      description: Frontend blocked until basic login complete
      affected_tasks: [2025-11-15-frontend-ui]
      severity: low
      mitigation: Define API contract early, use mocks for parallel development

    - category: security
      description: Authentication system requires careful security review
      affected_tasks: [all]
      severity: high
      mitigation: Security code review, penetration testing before production

  # Tags for categorization
  tags:
    - authentication
    - security
    - user-management
    - sso
    - mfa

# Notes:
# - Task IDs should match directory names (YYYY-MM-DD-task-name)
# - Dependencies use full paths to task directories
# - Blocks lists task IDs that depend on this task
# - All tasks must have unique IDs
# - No circular dependencies allowed
